<aside
  class="sidebar"
  [class.collapsed]="sidebarService.isCollapsed && !sidebarService.isMobileViewport()"
  [class.mobile-open]="sidebarService.isMobileOpen"
  [attr.aria-label]="'Primary sidebar navigation'"
>
  <button
    type="button"
    class="collapse-btn"
    (click)="toggleSidebar()"
    [attr.aria-label]="isExpanded ? 'Collapse sidebar' : 'Expand sidebar'"
  >
    <svg viewBox="0 0 24 24" fill="none">
      <path
        *ngIf="isExpanded"
        d="M15 18l-6-6 6-6"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <path
        *ngIf="!isExpanded"
        d="M9 6l6 6-6 6"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>

  <div class="sidebar-inner">
    <div class="sidebar-header">
      <button
        type="button"
        class="brand-button"
        (click)="toggleSidebar()"
        [attr.aria-label]="isExpanded ? 'Collapse sidebar' : 'Expand sidebar'"
      >
        <span class="brand-logo">
          <img src="assets/images/SAMS 2E.png" alt="SAMS logo" />
        </span>

        <div class="brand-copy" *ngIf="isExpanded">
          <h2>SAMS</h2>
          <h3>
            <span>Student Attendance</span>
            <br />
            <span>Monitoring System</span>
          </h3>
        </div>
      </button>
    </div>

    <div class="sidebar-separator"></div>

    <nav
      class="sidebar-nav"
      role="navigation"
      aria-label="Sidebar menu"
      (keydown)="onNavKeydown($event)"
    >
      <a
        #navItem
        *ngFor="let item of menuItems; let i = index"
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-link"
        [class.icon-only]="!isExpanded"
        [attr.aria-label]="item.label"
        [attr.title]="!isExpanded ? item.label : null"
        [tabIndex]="i === focusedIndex ? 0 : -1"
        (click)="onNavigate()"
      >
        <span class="nav-icon" aria-hidden="true" [ngSwitch]="item.icon">
          <svg *ngSwitchCase="'dashboard'" viewBox="0 0 24 24" fill="none">
            <rect
              x="3"
              y="3"
              width="8"
              height="8"
              rx="2"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <rect
              x="13"
              y="3"
              width="8"
              height="5"
              rx="2"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <rect
              x="13"
              y="10"
              width="8"
              height="11"
              rx="2"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <rect
              x="3"
              y="13"
              width="8"
              height="8"
              rx="2"
              stroke="currentColor"
              stroke-width="1.8"
            />
          </svg>

          <svg *ngSwitchCase="'students'" viewBox="0 0 24 24" fill="none">
            <path
              d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <circle cx="9.5" cy="7" r="4" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M20 8v6M17 11h6"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'faculty'" viewBox="0 0 24 24" fill="none">
            <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M3 21a6 6 0 0 1 12 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M16 4h5M16 8h5M17 12h4"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'parents'" viewBox="0 0 24 24" fill="none">
            <path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M16 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M3 21a5 5 0 0 1 10 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M11 21a5 5 0 0 1 10 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'subjects'" viewBox="0 0 24 24" fill="none">
            <path
              d="M5 4.5A2.5 2.5 0 0 1 7.5 2H20v17.5A2.5 2.5 0 0 0 17.5 17H5V4.5Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
            <path
              d="M8 7h8M8 11h8"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M5 17.5A2.5 2.5 0 0 0 7.5 20H20"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
          </svg>

          <svg *ngSwitchCase="'sections'" viewBox="0 0 24 24" fill="none">
            <rect
              x="3"
              y="4"
              width="18"
              height="16"
              rx="3"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M8 4v16M16 4v16M3 10h18M3 15h18"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'assignments'" viewBox="0 0 24 24" fill="none">
            <path
              d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
            <path d="M14 3v6h6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
            <path
              d="M9 14l2 2 4-5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <svg *ngSwitchCase="'accounts'" viewBox="0 0 24 24" fill="none">
            <circle cx="9" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M3 21a6 6 0 0 1 12 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M18 14v6M15 17h6"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'session'" viewBox="0 0 24 24" fill="none">
            <rect
              x="3"
              y="5"
              width="18"
              height="16"
              rx="3"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <path
              d="M8 3v4M16 3v4M3 10h18"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M12 13v5M9.5 15.5h5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'records'" viewBox="0 0 24 24" fill="none">
            <path
              d="M7 3h8l4 4v14H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
            <path
              d="M15 3v5h5M9 12h6M9 16h6"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'reports'" viewBox="0 0 24 24" fill="none">
            <path d="M4 20h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            <path
              d="M7 16V9M12 16V5M17 16v-3"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'scan'" viewBox="0 0 24 24" fill="none">
            <path
              d="M4 7V5a1 1 0 0 1 1-1h2"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M17 4h2a1 1 0 0 1 1 1v2"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M20 17v2a1 1 0 0 1-1 1h-2"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M7 20H5a1 1 0 0 1-1-1v-2"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path d="M7 8h3v3H7V8Z" stroke="currentColor" stroke-width="1.8" />
            <path d="M14 8h3v3h-3V8Z" stroke="currentColor" stroke-width="1.8" />
            <path d="M7 14h3v3H7v-3Z" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M14 14h1.5M17 14v3M14 17h3"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'my-attendance'" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M5 20a7 7 0 0 1 14 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'messages'" viewBox="0 0 24 24" fill="none">
            <path
              d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v8A2.5 2.5 0 0 1 17.5 16H9l-5 4v-4.5A2.5 2.5 0 0 1 4 13.5v-8Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
            <path
              d="M8 8h8M8 11.5h5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <svg *ngSwitchCase="'profile'" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M5 21a7 7 0 0 1 14 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M17 3.5l2 2 3-3"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <svg *ngSwitchCase="'parent-dashboard'" viewBox="0 0 24 24" fill="none">
            <path
              d="M4 20v-8.5L12 5l8 6.5V20"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M9 20v-6h6v6"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>

          <svg *ngSwitchCase="'child-attendance'" viewBox="0 0 24 24" fill="none">
            <path d="M8 7a4 4 0 1 0 8 0 4 4 0 0 0-8 0Z" stroke="currentColor" stroke-width="1.8" />
            <path
              d="M4 21a8 8 0 0 1 16 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
            <path
              d="M17 14l2 2 4-4"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>

        <span class="nav-text" *ngIf="isExpanded">{{ item.label }}</span>
        <span class="nav-pill" *ngIf="isExpanded"></span>
      </a>
    </nav>

    <footer class="sidebar-footer" *ngIf="isExpanded" aria-label="Current date and time">
      <div class="sidebar-clock-card">
        <div class="clock-time">{{ currentDateTime | date: 'h:mm:ss a' }}</div>
        <div class="clock-date">{{ currentDateTime | date: 'EEEE, MMMM d, y' }}</div>
      </div>
    </footer>
  </div>
</aside>
