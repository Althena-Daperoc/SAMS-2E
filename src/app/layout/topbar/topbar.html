<header class="topbar">
  <div class="topbar-left">
    <div class="page-copy">
      <div class="page-heading-row">
        <h1>{{ pageTitle }}</h1>
      </div>
    </div>
  </div>

  <div class="topbar-right">
    <div
      class="global-search"
      #searchWrapper
      [class.open]="isSearchOpen"
      [class.has-value]="!!searchQuery.trim()"
    >
      <div class="search-shell" [class.open]="isSearchOpen">
        <button type="button" class="search-toggle-btn" (click)="toggleSearch()">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.8" />
              <path
                d="M20 20l-4.2-4.2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </span>
        </button>

        <input
          #searchInput
          type="text"
          [(ngModel)]="searchQuery"
          class="search-input"
          placeholder="Search modules, pages, actions..."
          autocomplete="off"
          (focus)="onSearchFocus()"
          (input)="onSearchInput()"
          (keydown)="onSearchKeydown($event)"
        />

        <button
          *ngIf="isSearchOpen"
          type="button"
          class="search-shortcut"
          (click)="closeSearch(true)"
        >
          Esc
        </button>
      </div>

      <div class="search-panel" *ngIf="isSearchOpen">
        <div class="search-panel-header">
          <span>Global search</span>
          <small>Role-based modules</small>
        </div>

        <ng-container *ngIf="hasSearchResults; else noResults">
          <button
            type="button"
            class="search-result"
            *ngFor="let item of filteredSearchItems; let i = index"
            [class.active]="i === activeSearchIndex"
            (mouseenter)="selectSearchItem(i)"
            (click)="navigateToSearchItem(item)"
          >
            <span class="result-copy">
              <strong>{{ item.label }}</strong>
              <small>{{ item.description }}</small>
            </span>
            <span class="result-route">{{ item.route }}</span>
          </button>
        </ng-container>

        <ng-template #noResults>
          <div class="search-empty">
            <strong>No results</strong>
            <p>Try students, attendance, reports, messages.</p>
          </div>
        </ng-template>
      </div>
    </div>

    <button type="button" class="theme-toggle" [class.active]="isDarkMode" (click)="toggleTheme()">
      <span class="theme-icon">
        <svg *ngIf="!isDarkMode" viewBox="0 0 24 24" fill="none">
          <path
            d="M21 12.79A8.5 8.5 0 1 1 11.21 3 6.75 6.75 0 0 0 21 12.79Z"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>

        <svg *ngIf="isDarkMode" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
          <path
            d="M12 2v2M12 20v2M22 12h-2M4 12H2M19.8 4.2l-1.4 1.4M5.6 18.4l-1.4 1.4M19.8 19.8l-1.4-1.4M5.6 5.6 4.2 4.2"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
      </span>
    </button>

    <div class="notification-wrapper" #notificationWrapper>
      <button
        type="button"
        class="notification-btn"
        [class.open]="isNotificationOpen"
        (click)="toggleNotifications()"
      >
        <span class="bell-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M13.7 21a2 2 0 0 1-3.4 0"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>

        <span *ngIf="unreadNotificationCount > 0" class="notification-badge">
          {{ unreadNotificationCount }}
        </span>
      </button>

      <div class="notification-panel" *ngIf="isNotificationOpen">
        <div class="notification-header">
          <div>
            <strong>Notifications</strong>
            <small>System updates</small>
          </div>

          <button
            *ngIf="unreadNotificationCount > 0"
            type="button"
            class="mark-read-btn"
            (click)="markNotificationsPreviewRead()"
          >
            Mark read
          </button>
        </div>

        <div *ngIf="!isNotificationsLoading && notifications.length > 0">
          <button
            type="button"
            class="notification-item"
            *ngFor="let n of notifications"
            [class.unread]="!n.isRead"
            (click)="openNotification(n)"
          >
            <span class="notification-dot"></span>

            <span class="notification-copy">
              <strong>{{ n.title }}</strong>
              <small>{{ n.message }}</small>
              <em>{{ formatNotificationTime(n) }}</em>
            </span>
          </button>
        </div>

        <div
          *ngIf="!isNotificationsLoading && notifications.length === 0"
          class="notification-empty"
        >
          <strong>No notifications</strong>
          <p>You're all caught up.</p>
        </div>

        <div *ngIf="isNotificationsLoading" class="notification-empty">
          <strong>Loading notifications</strong>
          <p>Please wait.</p>
        </div>
      </div>
    </div>

    <div class="profile-wrapper">
      <button
        #profileButton
        type="button"
        class="profile-trigger"
        [class.open]="isProfileMenuOpen"
        (click)="toggleProfileMenu()"
        (keydown)="onProfileButtonKeydown($event)"
      >
        <span class="profile-avatar">{{ initials }}</span>

        <span class="profile-copy">
          <strong>{{ currentUserFullName }}</strong>
          <small>{{ roleLabel }}</small>
        </span>

        <span class="profile-caret">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M7 10l5 5 5-5"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </span>
      </button>

      <div #profileMenu class="profile-menu" *ngIf="isProfileMenuOpen">
        <div class="profile-summary">
          <span class="summary-avatar">{{ initials }}</span>

          <div class="summary-copy">
            <strong>{{ currentUserFullName }}</strong>
            <small>{{ roleLabel }}</small>
          </div>
        </div>

        <button type="button" class="menu-item" (click)="goToProfile()">
          <span class="menu-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
              <path
                d="M5 20a7 7 0 0 1 14 0"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
          </span>
          <span class="menu-copy">
            <strong>Profile</strong>
            <small>View account summary</small>
          </span>
        </button>

        <button type="button" class="menu-item" (click)="goToSettings()">
          <span class="menu-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z"
                stroke="currentColor"
                stroke-width="1.8"
              />
              <path
                d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 1 1-4 0v-.1a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 1 1 0-4h.1a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a2 2 0 1 1 4 0v.1a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6H20a2 2 0 1 1 0 4h-.1a1 1 0 0 0-.9.6Z"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="menu-copy">
            <strong>Settings</strong>
            <small>Preferences and display options</small>
          </span>
        </button>

        <button type="button" class="menu-item" (click)="goToFaqs()">
          <span class="menu-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M9.2 9a3 3 0 1 1 4.9 2.3c-.9.7-1.4 1.2-1.4 2.2v.3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M12 17.2h.01"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
              />
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8" />
            </svg>
          </span>
          <span class="menu-copy">
            <strong>FAQs / Help</strong>
            <small>Learn how to use SAMS</small>
          </span>
        </button>

        <div class="menu-divider"></div>

        <button type="button" class="menu-item danger" (click)="logout()">
          <span class="menu-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M9 21H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M16 17l5-5-5-5"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path d="M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </svg>
          </span>
          <span class="menu-copy">
            <strong>Logout</strong>
            <small>Securely sign out</small>
          </span>
        </button>
      </div>
    </div>
  </div>
</header>
